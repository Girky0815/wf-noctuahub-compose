name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: ソースコードのチェックアウト
        uses: actions/checkout@v4

      - name: Java 21の設定
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: バージョンコードの生成
        run: |
          TAG_NAME=${{ github.ref_name }}
          VERSION=${TAG_NAME#v}
          
          # セマンティックバージョニング形式（1.2.3など）から各コンポーネントを抽出
          IFS='.' read -r major minor patch <<< "$VERSION"
          
          # 数値に変換 (8進数誤判定を防ぐため 10# を使用)
          major=$((10#$major))
          minor=$((10#$minor))
          # パッチ番号にリビジョン等が含まれる可能性を考慮し、数値のみ抽出
          patch=$(echo "$patch" | grep -o -E '^[0-9]+')
          patch=$((10#$patch))
          
          # バージョンコードの計算 (例: v1.2.3 -> 10203001)
          # major * 10000000 + minor * 100000 + patch * 1000 + build (1固定)
          build=1
          versionCode=$(( major * 10000000 + minor * 100000 + patch * 1000 + build ))
          
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV
          echo "APP_VERSION_CODE=$versionCode" >> $GITHUB_ENV
          echo "Calculated Version: $VERSION"
          echo "Calculated Version Code: $versionCode"

      - name: Gradle Propertiesのクリーンアップ（org.gradle.java.homeの削除）
        run: |
          if grep -q "org.gradle.java.home" gradle.properties; then
            sed -i '/org.gradle.java.home/d' gradle.properties
            echo "Removed org.gradle.java.home to avoid path issues on runner."
          fi

      - name: Android用apkのビルド
        run: |
          chmod +x gradlew
          ./gradlew :composeApp:assembleRelease -PappVersion=${{ env.APP_VERSION }} -PappVersionCode=${{ env.APP_VERSION_CODE }}

      - name: Android用apkのファイル名の変更
        run: |
          APK_PATH="composeApp/build/outputs/apk/release/composeApp-release.apk"
          if [ -f "$APK_PATH" ]; then
            mv "$APK_PATH" "noctuahub-${{ github.ref_name }}-android-arm64-v8a.apk"
            echo "Renamed APK successfully."
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi

      - name: Android用apkのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: noctuahub-${{ github.ref_name }}-android-arm64-v8a.apk
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: ソースコードのチェックアウト
        uses: actions/checkout@v4

      - name: Java 21の設定
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: バージョンコードの生成
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV
          Write-Output "Calculated Version: $version"

      - name: Gradle Propertiesのクリーンアップ（org.gradle.java.homeの削除）
        shell: pwsh
        run: |
          if (Select-String -Path gradle.properties -Pattern "org.gradle.java.home") {
            (Get-Content gradle.properties) -notmatch "org.gradle.java.home" | Out-File gradle.properties -Encoding utf8
            Write-Output "Removed org.gradle.java.home to avoid path issues on runner."
          }

      - name: Windows用exeのビルド
        shell: pwsh
        run: |
          ./gradlew :composeApp:packageExe -PappVersion=${{ env.APP_VERSION }}

      - name: Windows用exeのファイル名の変更
        shell: pwsh
        run: |
          $exeDir = "composeApp/build/compose/binaries/main/exe"
          if (Test-Path $exeDir) {
            $exeFile = Get-ChildItem -Path $exeDir -Filter *.exe | Select-Object -First 1
            if ($exeFile) {
              Copy-Item $exeFile.FullName "noctuahub-${{ github.ref_name }}-windows-x64.exe"
              Write-Output "Copied and renamed EXE successfully to root."
            } else {
              Write-Error "Error: No EXE file found in $exeDir"
              exit 1
            }
          } else {
            Write-Error "Error: Directory $exeDir does not exist"
            exit 1
          }

      - name: Windows用exeのアップロード
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: noctuahub-${{ github.ref_name }}-windows-x64.exe
          if-no-files-found: error

  create-release:
    runs-on: ubuntu-latest
    needs: [build-android, build-windows]
    steps:
      - name: ソースコードのチェックアウト
        uses: actions/checkout@v4

      - name: Android用apkのダウンロード
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Windows用exeのダウンロード
        uses: actions/download-artifact@v4
        with:
          name: windows-exe

      - name: GitHub Release Draftの作成
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            noctuahub-${{ github.ref_name }}-android-arm64-v8a.apk \
            noctuahub-${{ github.ref_name }}-windows-x64.exe \
            --title "${{ github.ref_name }}" \
            --draft \
            --notes "Noctua Hub ${{ github.ref_name }} リリース下書き"
